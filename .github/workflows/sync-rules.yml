# 定时从 Loyalsoldier/v2ray-rules-dat 拉取并解包规则，写入 release 分支并打 tag。
# 远端无 release 时用 orphan 建分支（仅三个 txt）；已有 release 则在当前历史上追加 commit。

name: Sync v2ray rules

on:
  schedule:
    # 每天 14:00 UTC = 北京时间 22:00
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-rules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Install v2dat and sync
        env:
          RULES_DIR: ${{ github.workspace }}
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install github.com/urlesistiana/v2dat@latest
          bash sync-rules.sh

      - name: Commit to release branch and tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DAY="$(TZ=Asia/Shanghai date +%Y-%m-%d)"
          TAG="sync-${DAY}"

          # 先备份 txt；检出 release 前删除工作区文件，避免与未跟踪文件冲突
          STASH="$(mktemp -d)"
          cp -p geosite_cn.txt 'geosite_geolocation-!cn.txt' geoip_cn.txt "$STASH/"
          rm -f geosite_cn.txt 'geosite_geolocation-!cn.txt' geoip_cn.txt

          git fetch origin release 2>/dev/null || true
          if git rev-parse --verify refs/remotes/origin/release >/dev/null 2>&1; then
            git checkout -B release origin/release
            shopt -s nullglob
            for f in "$STASH"/*.txt; do cp -p "$f" .; done
          else
            git checkout --orphan release
            git rm -rf .
            shopt -s nullglob
            for f in "$STASH"/*.txt; do cp -p "$f" .; done
          fi
          rm -rf "$STASH"

          git add geosite_cn.txt 'geosite_geolocation-!cn.txt' geoip_cn.txt
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: sync v2ray rules ${DAY}"
          git tag -fa "${TAG}" -m "v2ray rules sync ${DAY}"

          git push origin release
          git push origin "refs/tags/${TAG}" --force
